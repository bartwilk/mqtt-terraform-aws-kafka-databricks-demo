apiVersion: apps/v1
kind: Deployment
metadata:
  name: iot-processor
  namespace: iot
spec:
  replicas: 3
  selector:
    matchLabels:
      app: iot-processor
  template:
    metadata:
      labels:
        app: iot-processor
    spec:
      serviceAccountName: iot-processor-sa
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: iot-processor
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/mqtt-iot-pipeline/iot-processor:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: kafka-connection
                  key: bootstrap_servers
            - name: KAFKA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: kafka-connection
                  key: username
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kafka-connection
                  key: password
            - name: KAFKA_IN_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: iot-processor-config
                  key: KAFKA_IN_TOPIC
            - name: KAFKA_OUT_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: iot-processor-config
                  key: KAFKA_OUT_TOPIC
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            periodSeconds: 10
            failureThreshold: 3
