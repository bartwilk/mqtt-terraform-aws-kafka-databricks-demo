name: produce-sample-data

on:
  workflow_dispatch:
    inputs:
      count:
        description: "Number of events to produce"
        required: true
        default: "100"
      topic:
        description: "Kafka topic"
        required: true
        default: "iot_raw"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: mqtt-iot-pipeline
  ENVIRONMENT: dev

jobs:
  produce:
    runs-on: kafka-infra-runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools (AWS CLI + Python deps)
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          mkdir -p "$HOME/.local/bin" "$HOME/.local/aws-cli"

          if ! command -v aws &>/dev/null; then
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscli.zip
            unzip -q /tmp/awscli.zip -d /tmp
            /tmp/aws/install --bin-dir "$HOME/.local/bin" --install-dir "$HOME/.local/aws-cli"
          fi

          # Install venv + pip, then install Kafka client
          sudo apt-get update -qq && sudo apt-get install -y -qq python3-venv python3-pip > /dev/null
          python3 -m venv /tmp/venv
          /tmp/venv/bin/pip install --quiet confluent-kafka
          echo "/tmp/venv/bin" >> "$GITHUB_PATH"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve MSK brokers and credentials
        run: |
          set -euo pipefail

          MSK_CLUSTER_NAME="${PROJECT_NAME}-${ENVIRONMENT}-msk"

          CLUSTER_ARN=$(aws kafka list-clusters-v2 \
            --cluster-name-filter "${MSK_CLUSTER_NAME}" \
            --query "ClusterInfoList[0].ClusterArn" \
            --output text)

          BOOTSTRAP_BROKERS=$(aws kafka get-bootstrap-brokers \
            --cluster-arn "$CLUSTER_ARN" \
            --query "BootstrapBrokerStringSaslScram" \
            --output text)

          SECRET_NAME="AmazonMSK_${PROJECT_NAME}-${ENVIRONMENT}-msk-sasl"
          CREDS_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "$SECRET_NAME" \
            --query "SecretString" \
            --output text)

          KAFKA_USER=$(echo "$CREDS_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['username'])")
          KAFKA_PASS=$(echo "$CREDS_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['password'])")

          echo "::add-mask::$KAFKA_PASS"
          echo "KAFKA_BOOTSTRAP_SERVERS=$BOOTSTRAP_BROKERS" >> "$GITHUB_ENV"
          echo "KAFKA_SASL_USERNAME=$KAFKA_USER" >> "$GITHUB_ENV"
          echo "KAFKA_SASL_PASSWORD=$KAFKA_PASS" >> "$GITHUB_ENV"

      - name: Produce sample data
        run: |
          python scripts/produce_sample_data.py \
            --count ${{ github.event.inputs.count }} \
            --topic ${{ github.event.inputs.topic }}
