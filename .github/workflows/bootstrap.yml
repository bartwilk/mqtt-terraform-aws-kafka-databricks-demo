name: bootstrap

# Run manually only — creates the AWS resources that the main pipeline depends on.
# Requires static AWS credentials (bootstrap IAM user) stored as GitHub secrets.
# After this runs once successfully, the main pipeline uses OIDC for all auth.
#
# Safe to re-run: imports existing resources into local state before applying.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    env:
      TF_VAR_state_bucket_name: ${{ vars.STATE_BUCKET_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Configure AWS credentials (static — bootstrap only)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_BOOTSTRAP_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_BOOTSTRAP_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Terraform Init (local state)
        working-directory: infra/bootstrap
        run: terraform init

      - name: Import existing resources (idempotent)
        working-directory: infra/bootstrap
        run: |
          set -euo pipefail
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="${TF_VAR_state_bucket_name}"
          REGION="us-east-1"

          import_if_missing() {
            local addr=$1 id=$2
            if terraform state show "$addr" > /dev/null 2>&1; then
              echo "$addr already in state"
            else
              echo "Importing $addr"
              terraform import "$addr" "$id" || true
            fi
          }

          # S3 bucket
          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            import_if_missing "aws_s3_bucket.tf_state" "$BUCKET"
            import_if_missing "aws_s3_bucket_versioning.tf_state" "$BUCKET"
            import_if_missing "aws_s3_bucket_server_side_encryption_configuration.tf_state" "$BUCKET"
            import_if_missing "aws_s3_bucket_public_access_block.tf_state" "$BUCKET"
          fi

          # DynamoDB table
          if aws dynamodb describe-table --table-name "terraform-state-locks" --region "$REGION" > /dev/null 2>&1; then
            import_if_missing "aws_dynamodb_table.tf_state_locks" "terraform-state-locks"
          fi

          # OIDC provider
          OIDC_ARN=$(aws iam list-open-id-connect-providers \
            --query "OpenIDConnectProviderList[?ends_with(Arn, '/token.actions.githubusercontent.com')].Arn" \
            --output text) || true
          if [ -n "$OIDC_ARN" ] && [ "$OIDC_ARN" != "None" ]; then
            import_if_missing "aws_iam_openid_connect_provider.github" "$OIDC_ARN"
          fi

          # IAM roles
          if aws iam get-role --role-name "github-actions-terraform-role" > /dev/null 2>&1; then
            import_if_missing "aws_iam_role.terraform" "github-actions-terraform-role"
          fi
          if aws iam get-role --role-name "github-actions-app-deploy-role" > /dev/null 2>&1; then
            import_if_missing "aws_iam_role.app_deploy" "github-actions-app-deploy-role"
          fi

          # IAM policies
          TF_POLICY_ARN="arn:aws:iam::${ACCOUNT_ID}:policy/github-actions-terraform-role-policy"
          if aws iam get-policy --policy-arn "$TF_POLICY_ARN" > /dev/null 2>&1; then
            import_if_missing "aws_iam_policy.terraform" "$TF_POLICY_ARN"
            import_if_missing "aws_iam_role_policy_attachment.terraform" "github-actions-terraform-role/$TF_POLICY_ARN"
          fi

          APP_POLICY_ARN="arn:aws:iam::${ACCOUNT_ID}:policy/github-actions-app-deploy-role-policy"
          if aws iam get-policy --policy-arn "$APP_POLICY_ARN" > /dev/null 2>&1; then
            import_if_missing "aws_iam_policy.app_deploy" "$APP_POLICY_ARN"
            import_if_missing "aws_iam_role_policy_attachment.app_deploy" "github-actions-app-deploy-role/$APP_POLICY_ARN"
          fi

      - name: Terraform Apply
        working-directory: infra/bootstrap
        run: terraform apply -auto-approve

      - name: Remove stale AdministratorAccess if attached
        run: |
          set -euo pipefail
          ROLE_NAME="github-actions-terraform-role"
          ADMIN_ARN="arn:aws:iam::aws:policy/AdministratorAccess"
          if aws iam list-attached-role-policies --role-name "$ROLE_NAME" \
              --query "AttachedPolicies[?PolicyArn=='${ADMIN_ARN}'].PolicyArn" \
              --output text | grep -q "$ADMIN_ARN"; then
            echo "Detaching stale AdministratorAccess from $ROLE_NAME"
            aws iam detach-role-policy --role-name "$ROLE_NAME" --policy-arn "$ADMIN_ARN"
          else
            echo "No stale AdministratorAccess found on $ROLE_NAME"
          fi

      - name: Print outputs
        working-directory: infra/bootstrap
        run: |
          echo "=== Bootstrap outputs ==="
          terraform output
          echo ""
          echo "Next steps:"
          echo "  1. Add AWS_TERRAFORM_ROLE_ARN secret = $(terraform output -raw terraform_role_arn)"
          echo "  2. Add AWS_APP_ROLE_ARN secret       = $(terraform output -raw app_deploy_role_arn)"
